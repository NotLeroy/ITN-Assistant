<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airline Tools</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="calculator-container">
      <div id="taxCalculator" class="calculator-box">
        <h2>Tax Refund Calculator</h2>
        <textarea
          id="taxInput"
          placeholder="Enter tax information here..."
        ></textarea>
        <button onclick="calculateTaxRefund()">Calculate Refund</button>
        <div id="taxResult"></div>
      </div>

      <div id="fareDifferenceCalculator" class="calculator-box">
        <h2>Fare Difference Calculator</h2>
        <textarea
          id="newFare"
          placeholder="Enter new fare details..."
        ></textarea>
        <textarea
          id="oldFare"
          placeholder="Enter old fare details..."
        ></textarea>
        <input
          type="text"
          id="airlineCode"
          placeholder="Enter airline code..."
        />
        <button id="calculateFare">Calculate Fare Difference</button>
        <div id="results"></div>
      </div>

      <div id="taxBreakdown" class="calculator-box">
        <!-- Tax Breakdown content will appear here -->
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
